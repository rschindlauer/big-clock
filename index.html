<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Clock</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --fg: #888;
            --muted: #555;
            --weather-fg: #777;
            --weather-muted: #4b4b4b;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            font-weight: 700;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Layout: keep the clock big, weather underneath */
        #wrap {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4vh 4vw;
        }

        #clock {
            line-height: 0.95;
            font-size: 20vw;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            margin-top: auto;
            margin-bottom: auto;
        }

        #period {
            font-size: 5vw;
            font-weight: 300;
            color: var(--muted);
            margin-left: 1vw;
            vertical-align: super;
        }

        #weather {
            width: min(92vw, 1200px);
            font-weight: 300;
            color: var(--weather-fg);
            font-size: 3.2vw;
            line-height: 1.2;
            text-align: center;
            margin-top: auto; /* pin to bottom */
            padding-bottom: 1vh;
        }

        #weather small {
            display: block;
            margin-top: 0.6vh;
            font-size: 2.2vw;
            color: var(--weather-muted);
            font-weight: 300;
        }

        /* Fancy bits */
        #weather-chart {
            display: block;
            width: 100%;
            height: 10vh;
            min-height: 54px;
            max-height: 140px;
            margin: 1.2vh auto 0;
            opacity: 0.9;
        }

        #weather-meta {
            margin-top: 0.8vh;
            font-size: 2.0vw;
            color: var(--weather-muted);
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        .chip {
            display: inline-flex;
            align-items: baseline;
            gap: 0.4vw;
            padding: 0.35vh 0.9vw;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px;
            background: rgba(255,255,255,0.03);
            margin: 0.4vh 0.3vw;
        }

        .chip b {
            color: var(--weather-fg);
            font-weight: 700;
        }

        /* When the screen is very tall/narrow, avoid oversized weather text */
        @media (max-aspect-ratio: 10/16) {
            #clock { font-size: 22vw; }
            #weather { font-size: 4.2vw; }
            #weather small { font-size: 3.0vw; }
        }

        /* When the screen is very wide, cap the clock size */
        @media (min-aspect-ratio: 21/9) {
            #clock { font-size: 16vw; }
            #period { font-size: 4vw; }
            #weather { font-size: 2.4vw; }
            #weather small { font-size: 1.7vw; }
        }

        /* Respect reduced motion (we only refresh on a timer, but keep it tidy) */
        @media (prefers-reduced-motion: reduce) {
            * { scroll-behavior: auto; }
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="clock" aria-label="Current time">
            <span id="time"></span><span id="period" aria-hidden="true"></span>
        </div>

        <div id="weather" aria-label="Weather">
            <div id="weather-line">Loading weather…</div>
            <small id="weather-sub"></small>
            <svg id="weather-chart" viewBox="0 0 1000 140" preserveAspectRatio="none" aria-label="Temperature chart" role="img">
                <defs>
                    <linearGradient id="tempFill" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.18)" />
                        <stop offset="100%" stop-color="rgba(255,255,255,0.00)" />
                    </linearGradient>
                </defs>
                <path id="chart-area" d="" fill="url(#tempFill)" />
                <path id="chart-line" d="" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                <g id="chart-points"></g>
            </svg>
            <div id="weather-meta" aria-label="Weather details"></div>
        </div>
    </div>

    <script>
        // --------- Clock ---------
        function renderClock(now) {
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const period = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('time').textContent = `${h}:${m}`;
            document.getElementById('period').textContent = period;
        }

        function tickClockAligned() {
            const now = new Date();
            renderClock(now);
            // Align to the next second boundary; we only show minutes, but this keeps it steady.
            const msToNextSecond = 1000 - now.getMilliseconds();
            setTimeout(tickClockAligned, msToNextSecond);
        }

        tickClockAligned();

        // --------- Weather ---------
        // Uses Open-Meteo (no API key):
        // - Geocoding: https://geocoding-api.open-meteo.com/v1/search?name=Berlin&count=1
        // - Forecast:   https://api.open-meteo.com/v1/forecast?latitude=..&longitude=..&current=..&daily=..

        const $weatherLine = document.getElementById('weather-line');
        const $weatherSub = document.getElementById('weather-sub');
        const $chartLine = document.getElementById('chart-line');
        const $chartArea = document.getElementById('chart-area');
        const $chartPoints = document.getElementById('chart-points');
        const $weatherMeta = document.getElementById('weather-meta');

        function qs() {
            return new URLSearchParams(location.search);
        }

        function pickUnits() {
            // units: imperial (default) or metric
            const units = (qs().get('units') || 'imperial').toLowerCase();
            return {
                units,
                temperature_unit: units === 'metric' ? 'celsius' : 'fahrenheit',
                windspeed_unit: units === 'metric' ? 'kmh' : 'mph'
            };
        }

        function wmoToText(code) {
            // Minimal WMO interpretation. (Intentionally compact; can be expanded later.)
            const map = {
                0: 'Clear',
                1: 'Mostly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Fog',
                48: 'Rime fog',
                51: 'Light drizzle',
                53: 'Drizzle',
                55: 'Heavy drizzle',
                61: 'Light rain',
                63: 'Rain',
                65: 'Heavy rain',
                71: 'Light snow',
                73: 'Snow',
                75: 'Heavy snow',
                80: 'Rain showers',
                81: 'Heavy showers',
                82: 'Violent showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm w/ hail',
                99: 'Thunderstorm w/ hail'
            };
            return map[code] ?? `Weather (${code})`;
        }

        async function geocodeCity(name) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`;
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error('Geocoding failed');
            const data = await res.json();
            const first = data?.results?.[0];
            if (!first) throw new Error('City not found');
            return {
                name: [first.name, first.admin1, first.country].filter(Boolean).join(', '),
                latitude: first.latitude,
                longitude: first.longitude,
                timezone: first.timezone || 'auto'
            };
        }

        function getLocationFromQuery() {
            const p = qs();
            const lat = p.get('lat');
            const lon = p.get('lon');
            const name = p.get('name');
            const city = p.get('city');
            if (lat && lon) {
                return {
                    kind: 'coords',
                    name: name || 'Local weather',
                    latitude: Number(lat),
                    longitude: Number(lon),
                    timezone: p.get('tz') || 'auto'
                };
            }
            if (city) {
                return { kind: 'city', city };
            }
            return null;
        }

        function getBrowserCoords() {
            return new Promise((resolve, reject) => {
                if (!('geolocation' in navigator)) {
                    reject(new Error('Geolocation unavailable'));
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({
                        kind: 'coords',
                        name: 'Local weather',
                        latitude: pos.coords.latitude,
                        longitude: pos.coords.longitude,
                        timezone: 'auto'
                    }),
                    (err) => reject(err),
                    { enableHighAccuracy: false, timeout: 8000, maximumAge: 15 * 60 * 1000 }
                );
            });
        }

        async function fetchWeather({ latitude, longitude, timezone, name }) {
            const { temperature_unit, windspeed_unit } = pickUnits();
            const url = new URL('https://api.open-meteo.com/v1/forecast');
            url.searchParams.set('latitude', String(latitude));
            url.searchParams.set('longitude', String(longitude));
            url.searchParams.set('timezone', timezone || 'auto');
            url.searchParams.set('temperature_unit', temperature_unit);
            url.searchParams.set('windspeed_unit', windspeed_unit);

            // current: temp + apparent + weather code + humidity + wind
            url.searchParams.set('current', 'temperature_2m,apparent_temperature,weather_code,relative_humidity_2m,wind_speed_10m');

            // hourly: today temperature curve
            url.searchParams.set('hourly', 'temperature_2m');

            // daily forecast: max/min + precip probability + weather code + sunrise/sunset
            url.searchParams.set('daily', 'temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,sunrise,sunset');
            url.searchParams.set('forecast_days', '1');

            const res = await fetch(url.toString(), { cache: 'no-store' });
            if (!res.ok) throw new Error('Weather fetch failed');
            const data = await res.json();

            const cur = data?.current;
            const daily = data?.daily;
            const hourly = data?.hourly;

            if (!cur || !daily) throw new Error('Weather data missing');

            const temps = Array.isArray(hourly?.temperature_2m) ? hourly.temperature_2m.slice(0, 24) : [];

            return {
                placeName: name,
                currentTemp: Math.round(cur.temperature_2m),
                feelsLike: Math.round(cur.apparent_temperature),
                humidity: cur.relative_humidity_2m,
                wind: cur.wind_speed_10m,
                currentCode: cur.weather_code,
                hi: Math.round(daily.temperature_2m_max?.[0]),
                lo: Math.round(daily.temperature_2m_min?.[0]),
                pop: daily.precipitation_probability_max?.[0],
                todayCode: daily.weather_code?.[0],
                sunrise: daily.sunrise?.[0],
                sunset: daily.sunset?.[0],
                temps,
                unitSymbol: temperature_unit === 'fahrenheit' ? '°F' : '°C',
                windUnit: windspeed_unit === 'mph' ? 'mph' : 'km/h'
            };
        }

        function fmtTimeHHMM(isoLike) {
            if (!isoLike) return null;
            const d = new Date(isoLike);
            if (Number.isNaN(d.getTime())) return null;
            const h = String(d.getHours()).padStart(2, '0');
            const m = String(d.getMinutes()).padStart(2, '0');
            return `${h}:${m}`;
        }

        function drawTempChart(temps, unitSymbol) {
            if (!temps || temps.length < 2) {
                $chartLine.setAttribute('d', '');
                $chartArea.setAttribute('d', '');
                $chartPoints.innerHTML = '';
                return;
            }

            const W = 1000;
            const H = 140;
            const padX = 18;
            const padY = 14;
            const innerW = W - padX * 2;
            const innerH = H - padY * 2;

            const tmin = Math.min(...temps);
            const tmax = Math.max(...temps);
            const span = Math.max(1, tmax - tmin);

            const pts = temps.map((t, i) => {
                const x = padX + (i / (temps.length - 1)) * innerW;
                const y = padY + (1 - (t - tmin) / span) * innerH;
                return { x, y, t };
            });

            // Smooth-ish line via quadratic segments
            let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
            for (let i = 1; i < pts.length; i++) {
                const prev = pts[i - 1];
                const cur = pts[i];
                const cx = ((prev.x + cur.x) / 2).toFixed(1);
                const cy = ((prev.y + cur.y) / 2).toFixed(1);
                d += ` Q ${prev.x.toFixed(1)} ${prev.y.toFixed(1)} ${cx} ${cy}`;
                if (i === pts.length - 1) {
                    d += ` T ${cur.x.toFixed(1)} ${cur.y.toFixed(1)}`;
                }
            }

            $chartLine.setAttribute('d', d);

            const area = `${d} L ${pts[pts.length - 1].x.toFixed(1)} ${(H - padY).toFixed(1)} L ${pts[0].x.toFixed(1)} ${(H - padY).toFixed(1)} Z`;
            $chartArea.setAttribute('d', area);

            // Mark min/max points
            const minIdx = temps.indexOf(tmin);
            const maxIdx = temps.indexOf(tmax);
            const marks = [minIdx, maxIdx].filter((v, i, a) => a.indexOf(v) === i);

            $chartPoints.innerHTML = marks.map(idx => {
                const p = pts[idx];
                const labelY = Math.max(16, p.y - 10);
                const anchor = idx < temps.length * 0.2 ? 'start' : (idx > temps.length * 0.8 ? 'end' : 'middle');
                return `
                    <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5" fill="rgba(255,255,255,0.55)" />
                    <text x="${p.x.toFixed(1)}" y="${labelY.toFixed(1)}" fill="rgba(255,255,255,0.55)" font-size="20" text-anchor="${anchor}" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">${Math.round(p.t)}${unitSymbol}</text>
                `;
            }).join('');
        }

        function renderWeather(w) {
            const cond = wmoToText(w.currentCode);
            const todayCond = wmoToText(w.todayCode);
            const popTxt = (w.pop === 0 || w.pop) ? ` • ${w.pop}% precip` : '';

            $weatherLine.textContent = `${w.placeName}: ${w.currentTemp}${w.unitSymbol} (${cond})`;
            $weatherSub.textContent = `Today: ${w.hi}${w.unitSymbol} / ${w.lo}${w.unitSymbol} • ${todayCond}${popTxt}`;

            drawTempChart(w.temps, w.unitSymbol);

            const hum = (w.humidity === 0 || w.humidity) ? `${w.humidity}%` : '—';
            const wind = (w.wind === 0 || w.wind) ? `${Math.round(w.wind)} ${w.windUnit}` : '—';
            const sr = fmtTimeHHMM(w.sunrise) || '—';
            const ss = fmtTimeHHMM(w.sunset) || '—';

            $weatherMeta.innerHTML = `
                <span class="chip">Feels <b>${w.feelsLike}${w.unitSymbol}</b></span>
                <span class="chip">Humidity <b>${hum}</b></span>
                <span class="chip">Wind <b>${wind}</b></span>
                <span class="chip">Sun <b>${sr}</b>–<b>${ss}</b></span>
            `;
        }

        async function updateWeatherOnce() {
            try {
                $weatherLine.textContent = 'Loading weather…';
                $weatherSub.textContent = '';

                const queryLoc = getLocationFromQuery();
                let loc;

                if (queryLoc?.kind === 'coords') {
                    loc = queryLoc;
                } else if (queryLoc?.kind === 'city') {
                    loc = await geocodeCity(queryLoc.city);
                } else if ((qs().get('geo') || '').toLowerCase() === '1') {
                    // Optional: force browser geolocation via ?geo=1
                    loc = await getBrowserCoords();
                } else {
                    // Default location: Seattle (hard-coded coords to avoid needing geocoding)
                    loc = {
                        name: 'Seattle, WA',
                        latitude: 47.6062,
                        longitude: -122.3321,
                        timezone: 'America/Los_Angeles'
                    };
                }

                const w = await fetchWeather(loc);
                renderWeather(w);
            } catch (e) {
                // Give the user a clear way to fix it via URL params.
                console.error('Weather error:', e);
                $weatherLine.textContent = 'Weather unavailable.';
                $weatherSub.textContent = 'Check internet/DNS, or try ?lat=47.6062&lon=-122.3321&name=Seattle (optional: &units=metric, &geo=1)';
            }
        }

        // Initial load + refresh every 10 minutes.
        updateWeatherOnce();
        setInterval(updateWeatherOnce, 10 * 60 * 1000);

        // --------- Auto-reload on deploy ---------
        // Poll /version.txt (generated at image build time) and reload if it changes.
        let __lastVersion = null;
        async function __checkForUpdate() {
            try {
                const r = await fetch('/version.txt', { cache: 'no-store' });
                if (!r.ok) return;
                const v = (await r.text()).trim();
                if (!v) return;
                if (__lastVersion === null) __lastVersion = v;
                else if (v !== __lastVersion) location.reload();
            } catch {
                // ignore
            }
        }
        __checkForUpdate();
        setInterval(__checkForUpdate, 15 * 1000);
    </script>
</body>
</html>

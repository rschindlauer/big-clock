<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Clock</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --fg: rgba(255,255,255,0.70);
            --muted: rgba(255,255,255,0.38);
            --weather-fg: rgba(255,255,255,0.66);
            --weather-muted: rgba(255,255,255,0.42);
        }

        body {
            background: radial-gradient(1200px 900px at 50% 30%, rgba(255,255,255,0.045), transparent 55%), var(--bg);
            color: var(--fg);
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            font-weight: 700;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            text-rendering: geometricPrecision;
        }

        /* Layout: keep the clock big, weather underneath */
        #wrap {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4vh 4vw;
        }

        #clock {
            line-height: 0.95;
            font-size: 20vw;
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            margin-top: auto;
            margin-bottom: auto;
            color: rgba(255,255,255,0.78);
            text-shadow:
                0 18px 50px rgba(0,0,0,0.55),
                0 2px 0 rgba(255,255,255,0.06);

        }

        #period {
            font-size: 5vw;
            font-weight: 300;
            color: rgba(255, 180, 60, 0.85);
            margin-left: 1vw;
            letter-spacing: 0.12em;
            line-height: 1;
            vertical-align: baseline;
        }

        #weather {
            width: min(92vw, 1200px);
            font-weight: 300;
            color: var(--weather-fg);
            font-size: 3.2vw;
            line-height: 1.2;
            text-align: center;
            margin-top: auto; /* pin to bottom */
            padding-bottom: 1.4vh;
        }

        /* A subtle “playful” underline shimmer behind the place name */
        #weather-line {
            display: inline-block;
            padding: 0.15vh 0.6vw;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
            border: 1px solid rgba(255,255,255,0.06);
        }

        #weather small {
            display: block;
            margin-top: 0.6vh;
            font-size: 2.2vw;
            color: var(--weather-muted);
            font-weight: 300;
        }

        /* Unified weather strip */
        #weather-card {
            margin: 1.2vh auto 0;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            background: linear-gradient(160deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02));
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
            display: flex;
            align-items: stretch;
            overflow: hidden;
            text-align: left;
        }

        /* Hide the card entirely until we have real data */
        #weather-card:empty { display: none; }
        #weather-card[data-ready="0"] { display: none; }

        /* Today section — left of the strip */
        #weather-today {
            display: flex;
            align-items: center;
            gap: 1.2vw;
            padding: 1.4vh 2.0vw;
            flex: 0 0 auto;
            border-right: 1px solid rgba(255,255,255,0.07);
        }

        #weather-icon {
            width: 5.0vw;
            min-width: 36px;
            max-width: 68px;
            aspect-ratio: 1 / 1;
            display: grid;
            place-items: center;
        }

        #weather-icon svg {
            width: 84%;
            height: 84%;
            opacity: 0.88;
        }

        #weather-now {
            font-size: 3.6vw;
            line-height: 1.0;
            letter-spacing: -0.03em;
            font-weight: 700;
        }

        #weather-now .temp {
            font-variant-numeric: tabular-nums;
        }

        #weather-hilo {
            margin-top: 0.4vh;
            font-size: 1.8vw;
            color: rgba(255,255,255,0.38);
            font-weight: 300;
        }

        #weather-hilo .hi-val {
            font-size: 2.4vw;
            color: rgba(255,255,255,0.70);
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* Forecast — fills the rest of the strip */
        #weather-forecast {
            display: flex;
            flex: 1;
        }

        .forecast-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.2vh 0.8vw;
            gap: 0.4vh;
            flex: 1;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .forecast-day:last-child { border-right: none; }

        .forecast-day .day-name {
            font-size: 1.3vw;
            color: rgba(255,255,255,0.32);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .forecast-day .day-icon {
            width: 3.2vw;
            min-width: 24px;
            max-width: 48px;
            aspect-ratio: 1 / 1;
            display: grid;
            place-items: center;
        }

        .forecast-day .day-icon svg {
            width: 84%;
            height: 84%;
            opacity: 0.82;
        }

        .forecast-day .day-hi {
            font-size: 2.8vw;
            font-weight: 700;
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
        }

        .forecast-day .day-lo {
            font-size: 1.8vw;
            color: rgba(255,255,255,0.28);
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        /* Temperature accent colors */
        .t-cold { --acc: #66d9ff; }
        .t-mild { --acc: #9cffd8; }
        .t-warm { --acc: #ffd36b; }
        .t-hot  { --acc: #ff7a7a; }

        #weather-card {
            border-color: color-mix(in srgb, var(--acc, rgba(255,255,255,0.10)) 30%, rgba(255,255,255,0.08));
        }
        #weather-now .temp {
            color: color-mix(in srgb, var(--acc, rgba(255,255,255,0.86)) 85%, rgba(255,255,255,0.86));
            text-shadow: 0 14px 34px color-mix(in srgb, var(--acc, rgba(0,0,0,0.0)) 35%, rgba(0,0,0,0));
        }
        .forecast-day .day-hi {
            color: color-mix(in srgb, var(--acc, rgba(255,255,255,0.86)) 85%, rgba(255,255,255,0.86));
        }

        /* When the screen is very tall/narrow, avoid oversized weather text */
        @media (max-aspect-ratio: 10/16) {
            #clock { font-size: 22vw; }
            #weather { font-size: 4.2vw; }
            #weather small { font-size: 3.0vw; }
        }

        /* When the screen is very wide, cap the clock size */
        @media (min-aspect-ratio: 21/9) {
            #clock { font-size: 16vw; }
            #period { font-size: 4vw; }
            #weather { font-size: 2.4vw; }
            #weather small { font-size: 1.7vw; }
        }

        /* Respect reduced motion (we only refresh on a timer, but keep it tidy) */
        @media (prefers-reduced-motion: reduce) {
            * { scroll-behavior: auto; }
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="clock" aria-label="Current time">
            <span id="time"></span><span id="period" aria-hidden="true"></span>
        </div>

        <div id="weather" aria-label="Weather">
            <div id="weather-line" style="display:none"></div>
            <small id="weather-sub" style="display:none"></small>
            <div id="weather-card" role="group" aria-label="Weather summary" data-ready="0">
                <div id="weather-today">
                    <div id="weather-icon" aria-hidden="true"></div>
                    <div id="weather-temps">
                        <div id="weather-now"></div>
                        <div id="weather-hilo"></div>
                    </div>
                </div>
                <div id="weather-forecast"></div>
            </div>
        </div>
    </div>

    <script>
        // --------- Clock ---------
        function renderClock(now) {
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const period = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('time').textContent = `${h}:${m}`;
            document.getElementById('period').textContent = period;
        }

        function tickClockAligned() {
            const now = new Date();
            renderClock(now);
            // Align to the next second boundary; we only show minutes, but this keeps it steady.
            const msToNextSecond = 1000 - now.getMilliseconds();
            setTimeout(tickClockAligned, msToNextSecond);
        }

        tickClockAligned();

        // --------- Weather ---------
        // Uses Open-Meteo (no API key):
        // - Geocoding: https://geocoding-api.open-meteo.com/v1/search?name=Berlin&count=1
        // - Forecast:   https://api.open-meteo.com/v1/forecast?latitude=..&longitude=..&current=..&daily=..

        const $weatherLine = document.getElementById('weather-line');
        const $weatherSub = document.getElementById('weather-sub');
        const $weatherCard = document.getElementById('weather-card');
        const $weatherIcon = document.getElementById('weather-icon');
        const $weatherNow = document.getElementById('weather-now');
        const $weatherHiLo = document.getElementById('weather-hilo');
        const $weatherForecast = document.getElementById('weather-forecast');

        function qs() {
            return new URLSearchParams(location.search);
        }

        function pickUnits() {
            // units: imperial (default) or metric
            const units = (qs().get('units') || 'imperial').toLowerCase();
            return {
                units,
                temperature_unit: units === 'metric' ? 'celsius' : 'fahrenheit',
                windspeed_unit: units === 'metric' ? 'kmh' : 'mph'
            };
        }

        function wmoToText(code) {
            // Minimal WMO interpretation. (Intentionally compact; can be expanded later.)
            const map = {
                0: 'Clear',
                1: 'Mostly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Fog',
                48: 'Rime fog',
                51: 'Light drizzle',
                53: 'Drizzle',
                55: 'Heavy drizzle',
                61: 'Light rain',
                63: 'Rain',
                65: 'Heavy rain',
                71: 'Light snow',
                73: 'Snow',
                75: 'Heavy snow',
                80: 'Rain showers',
                81: 'Heavy showers',
                82: 'Violent showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm w/ hail',
                99: 'Thunderstorm w/ hail'
            };
            return map[code] ?? `Weather (${code})`;
        }

        async function geocodeCity(name) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`;
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error('Geocoding failed');
            const data = await res.json();
            const first = data?.results?.[0];
            if (!first) throw new Error('City not found');
            return {
                name: [first.name, first.admin1, first.country].filter(Boolean).join(', '),
                latitude: first.latitude,
                longitude: first.longitude,
                timezone: first.timezone || 'auto'
            };
        }

        function getLocationFromQuery() {
            const p = qs();
            const lat = p.get('lat');
            const lon = p.get('lon');
            const name = p.get('name');
            const city = p.get('city');
            if (lat && lon) {
                return {
                    kind: 'coords',
                    name: name || 'Local weather',
                    latitude: Number(lat),
                    longitude: Number(lon),
                    timezone: p.get('tz') || 'auto'
                };
            }
            if (city) {
                return { kind: 'city', city };
            }
            return null;
        }

        function getBrowserCoords() {
            return new Promise((resolve, reject) => {
                if (!('geolocation' in navigator)) {
                    reject(new Error('Geolocation unavailable'));
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({
                        kind: 'coords',
                        name: 'Local weather',
                        latitude: pos.coords.latitude,
                        longitude: pos.coords.longitude,
                        timezone: 'auto'
                    }),
                    (err) => reject(err),
                    { enableHighAccuracy: false, timeout: 8000, maximumAge: 15 * 60 * 1000 }
                );
            });
        }

        async function fetchWeather({ latitude, longitude, timezone, name }) {
            const { temperature_unit, windspeed_unit } = pickUnits();
            const url = new URL('https://api.open-meteo.com/v1/forecast');
            url.searchParams.set('latitude', String(latitude));
            url.searchParams.set('longitude', String(longitude));
            url.searchParams.set('timezone', timezone || 'auto');
            url.searchParams.set('temperature_unit', temperature_unit);
            url.searchParams.set('windspeed_unit', windspeed_unit);

            // current: temp + apparent + weather code + humidity + wind
            url.searchParams.set('current', 'temperature_2m,apparent_temperature,weather_code,relative_humidity_2m,wind_speed_10m');

            // hourly: today temperature curve
            url.searchParams.set('hourly', 'temperature_2m');

            // daily forecast: max/min + precip probability + weather code + sunrise/sunset
            url.searchParams.set('daily', 'temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,sunrise,sunset');
            url.searchParams.set('forecast_days', '5');

            const res = await fetch(url.toString(), { cache: 'no-store' });
            if (!res.ok) throw new Error('Weather fetch failed');
            const data = await res.json();

            const cur = data?.current;
            const daily = data?.daily;
            const hourly = data?.hourly;

            if (!cur || !daily) throw new Error('Weather data missing');

            const temps = Array.isArray(hourly?.temperature_2m) ? hourly.temperature_2m.slice(0, 24) : [];

            return {
                placeName: name,
                currentTemp: Math.round(cur.temperature_2m),
                feelsLike: Math.round(cur.apparent_temperature),
                humidity: cur.relative_humidity_2m,
                wind: cur.wind_speed_10m,
                currentCode: cur.weather_code,
                hi: Math.round(daily.temperature_2m_max?.[0]),
                lo: Math.round(daily.temperature_2m_min?.[0]),
                pop: daily.precipitation_probability_max?.[0],
                todayCode: daily.weather_code?.[0],
                sunrise: daily.sunrise?.[0],
                sunset: daily.sunset?.[0],
                temps,
                unitSymbol: temperature_unit === 'fahrenheit' ? '°F' : '°C',
                windUnit: windspeed_unit === 'mph' ? 'mph' : 'km/h',
                forecast: (daily.time ?? []).slice(1).map((date, i) => ({
                    date,
                    hi: Math.round(daily.temperature_2m_max[i + 1]),
                    lo: Math.round(daily.temperature_2m_min[i + 1]),
                    code: daily.weather_code[i + 1],
                }))
            };
        }

        function fmtTimeHHMM(isoLike) {
            if (!isoLike) return null;
            const d = new Date(isoLike);
            if (Number.isNaN(d.getTime())) return null;
            const h = String(d.getHours()).padStart(2, '0');
            const m = String(d.getMinutes()).padStart(2, '0');
            return `${h}:${m}`;
        }

        function tempClass(tempF, unitSymbol) {
            // If metric, convert thresholds roughly
            const t = unitSymbol === '°C' ? (tempF * 9/5 + 32) : tempF;
            if (t <= 45) return 't-cold';
            if (t <= 65) return 't-mild';
            if (t <= 82) return 't-warm';
            return 't-hot';
        }

        function iconForWmo(code) {
            // Simple inline SVG set (no external assets)
            const common = 'fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"';
            const glow = 'stroke="rgba(255,255,255,0.45)"';

            // helpers
            const sun = `
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <circle cx="50" cy="50" r="18" ${common} />
                <g ${common} ${glow}>
                  <path d="M50 10v10"/><path d="M50 80v10"/>
                  <path d="M10 50h10"/><path d="M80 50h10"/>
                  <path d="M21 21l7 7"/><path d="M72 72l7 7"/>
                  <path d="M79 21l-7 7"/><path d="M28 72l-7 7"/>
                </g>
              </svg>`;

            const cloud = `
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <path d="M28 62c-10 0-18-7-18-16 0-8 6-15 14-16 3-12 15-20 28-18 11 1 20 9 22 19 9 1 16 8 16 17 0 10-9 18-20 18H28z" ${common}/>
              </svg>`;

            const rain = `
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <path d="M28 54c-10 0-18-7-18-16 0-8 6-15 14-16 3-12 15-20 28-18 11 1 20 9 22 19 9 1 16 8 16 17 0 10-9 18-20 18H28z" ${common}/>
                <g ${common}>
                  <path d="M34 70l-6 10"/><path d="M52 70l-6 10"/><path d="M70 70l-6 10"/>
                </g>
              </svg>`;

            const snow = `
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <path d="M28 54c-10 0-18-7-18-16 0-8 6-15 14-16 3-12 15-20 28-18 11 1 20 9 22 19 9 1 16 8 16 17 0 10-9 18-20 18H28z" ${common}/>
                <g ${common}>
                  <path d="M35 72h0"/><path d="M50 80h0"/><path d="M65 72h0"/>
                </g>
              </svg>`;

            const fog = `
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <path d="M20 44h60" ${common} ${glow}/>
                <path d="M14 58h72" ${common}/>
                <path d="M22 72h56" ${common} ${glow}/>
              </svg>`;

            const storm = `
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <path d="M28 52c-10 0-18-7-18-16 0-8 6-15 14-16 3-12 15-20 28-18 11 1 20 9 22 19 9 1 16 8 16 17 0 10-9 18-20 18H28z" ${common}/>
                <path d="M52 62l-10 16h10l-8 14" ${common}/>
              </svg>`;

            if (code === 0) return sun;
            if (code === 1 || code === 2) return sun; // mostly/partly: keep sun vibe
            if (code === 3) return cloud;
            if (code === 45 || code === 48) return fog;
            if ([51,53,55,61,63,65,80,81,82].includes(code)) return rain;
            if ([71,73,75].includes(code)) return snow;
            if ([95,96,99].includes(code)) return storm;
            return cloud;
        }

        function renderWeather(w) {
            const cond = wmoToText(w.currentCode);

            // Accent color by current temp
            $weatherCard.classList.remove('t-cold','t-mild','t-warm','t-hot');
            $weatherCard.classList.add(tempClass(w.currentTemp, w.unitSymbol));

            $weatherLine.textContent = w.placeName;
            $weatherSub.textContent = '';

            $weatherIcon.innerHTML = iconForWmo(w.todayCode ?? w.currentCode);

            $weatherNow.innerHTML = `<span class="temp">${w.currentTemp}${w.unitSymbol}</span>`;
            $weatherHiLo.innerHTML = `H <span class="hi-val">${w.hi}${w.unitSymbol}</span>  ·  L ${w.lo}${w.unitSymbol}`;

            $weatherCard.setAttribute('data-ready', '1');

            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            $weatherForecast.innerHTML = (w.forecast ?? []).map(day => {
                const d = new Date(day.date + 'T12:00:00');
                const name = dayNames[d.getDay()];
                const cls = tempClass(day.hi, w.unitSymbol);
                return `<div class="forecast-day ${cls}">
                    <span class="day-name">${name}</span>
                    <div class="day-icon">${iconForWmo(day.code)}</div>
                    <span class="day-hi">${day.hi}${w.unitSymbol}</span>
                    <span class="day-lo">${day.lo}${w.unitSymbol}</span>
                </div>`;
            }).join('');
        }


        async function updateWeatherOnce() {
            try {
                $weatherLine.textContent = 'Loading weather…';
                $weatherSub.textContent = '';

                const queryLoc = getLocationFromQuery();
                let loc;

                if (queryLoc?.kind === 'coords') {
                    loc = queryLoc;
                } else if (queryLoc?.kind === 'city') {
                    loc = await geocodeCity(queryLoc.city);
                } else if ((qs().get('geo') || '').toLowerCase() === '1') {
                    // Optional: force browser geolocation via ?geo=1
                    loc = await getBrowserCoords();
                } else {
                    // Default location: Seattle (hard-coded coords to avoid needing geocoding)
                    loc = {
                        name: 'Seattle, WA',
                        latitude: 47.6062,
                        longitude: -122.3321,
                        timezone: 'America/Los_Angeles'
                    };
                }

                const w = await fetchWeather(loc);
                renderWeather(w);
            } catch (e) {
                // Give the user a clear way to fix it via URL params.
                console.error('Weather error:', e);
                $weatherLine.textContent = 'Weather unavailable.';
                $weatherSub.textContent = 'Check internet/DNS, or try ?lat=47.6062&lon=-122.3321&name=Seattle (optional: &units=metric, &geo=1)';
            }
        }

        // Initial load + refresh every 10 minutes.
        updateWeatherOnce();
        setInterval(updateWeatherOnce, 10 * 60 * 1000);

        // --------- Auto-reload on deploy ---------
        // Poll /version.txt (generated at image build time) and reload if it changes.
        let __lastVersion = null;
        async function __checkForUpdate() {
            try {
                const r = await fetch('/version.txt', { cache: 'no-store' });
                if (!r.ok) return;
                const v = (await r.text()).trim();
                if (!v) return;
                if (__lastVersion === null) __lastVersion = v;
                else if (v !== __lastVersion) location.reload();
            } catch {
                // ignore
            }
        }
        __checkForUpdate();
        setInterval(__checkForUpdate, 15 * 1000);
    </script>
</body>
</html>
